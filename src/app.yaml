runtime: python311

env: standard
instance_class: F2

runtime_config:
  python_version: 3

manual_scaling:
  instances: 1

steps:
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args: ['-c', 'gcloud config set app/cloud_build_timeout 1600 && gcloud app deploy']
timeout: '1600s'